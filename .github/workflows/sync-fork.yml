name: Sync Client Forks

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        fork:
          - apbrandstore/ap-brand-store
          - saidurahmaan/sarar-global
          - mdshakil05382/sajwear
    steps:
      - name: Sync fork
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ matrix.fork }}/merge-upstream \
            -d '{"branch":"master"}'